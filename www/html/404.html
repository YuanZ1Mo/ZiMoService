<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — ZiMo</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  .nf { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:24px; }
  .nf-code { font-size:120px; font-weight:800; color:var(--ac); line-height:1; letter-spacing:-4px; }
  .nf-tag  { font-size:14px; color:var(--ac2); background:var(--bg3); padding:4px 16px; border-radius:20px; margin-top:8px; }
  .nf-title { font-size:22px; color:var(--fg); margin-top:24px; font-weight:600; }
  .nf-desc  { font-size:14px; color:var(--fg3); margin-top:8px; max-width:400px; line-height:1.6; }
  .nf-links { display:flex; gap:12px; margin-top:28px; flex-wrap:wrap; justify-content:center; }
  .nf-link  { display:inline-block; padding:10px 24px; border-radius:8px; text-decoration:none; font-size:14px; font-weight:500; transition:all .15s; }
  .nf-link-go  { background:var(--ac); color:var(--bg0); }
  .nf-link-go:hover  { background:var(--ac2); }
  .nf-link-doc { background:var(--bg3); color:var(--fg2); border:1px solid var(--border); }
  .nf-link-doc:hover { border-color:var(--ac); color:var(--fg); }
  .nf-footer { font-size:12px; color:var(--fg3); margin-top:48px; }
</style>
</head>
<body>
<div class="nf">
  <div class="nf-code">404</div>
  <div class="nf-tag">HTTP 状态码</div>
  <div class="nf-title">页面未找到</div>
  <div class="nf-desc">你访问的路径不存在，可能已被移动、删除，或者 URL 输入有误。请检查地址后重试。</div>
  <div class="nf-links">
    <a href="/" class="nf-link nf-link-go">🏠 返回首页</a>
  </div>
  <div class="nf-footer">ZiMo Service</div>
</div>
</body>
</html>
