<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZiMo Service</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  .landing { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:24px; }
  .landing-icon { font-size:64px; margin-bottom:16px; }
  .landing-title { font-size:28px; font-weight:700; color:var(--ac2); margin-bottom:8px; }
  .landing-sub { font-size:14px; color:var(--fg3); margin-bottom:40px; }
  .landing-btn { display:inline-block; padding:14px 48px; background:var(--ac); color:var(--bg0); border:none; border-radius:8px; font-size:16px; font-weight:600; cursor:pointer; text-decoration:none; transition:opacity .15s,transform .15s; }
  .landing-btn:hover { opacity:.85; transform:translateY(-1px); }
</style>
</head>
<body>
<div class="landing">
  <div class="landing-icon">⚡</div>
  <h1 class="landing-title">ZiMo Service</h1>
  <p class="landing-sub">ZiMo 客户端生态核心服务</p>
  <a href="/control" class="landing-btn">进入控制中心</a>
</div>
</body>
</html>
